name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.1.0)"
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: assaf-benjosef/vivarium

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build

  docker:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  pack:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Enable KVM
        run: sudo usermod -aG kvm "$USER" && sudo chmod 666 /dev/kvm

      - name: Install SmolVM
        run: curl -sSL https://smolmachines.com/install.sh | bash

      - name: Create SmolVM pack
        run: |
          VERSION="${{ needs.docker.outputs.version }}"
          VERSION_NUM="${VERSION#v}"
          smolvm pack create \
            --image "ghcr.io/${{ env.IMAGE_NAME }}:${VERSION_NUM}" \
            --cpus 2 \
            --mem 2048 \
            --entrypoint "node /app/dist/index.js" \
            -o vivarium

      - uses: actions/upload-artifact@v4
        with:
          name: smolmachine-pack
          path: vivarium.smolmachine
          retention-days: 1

  release:
    needs: [docker, pack]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: smolmachine-pack

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.docker.outputs.version }}"
          gh release create "$TAG" \
            vivarium.smolmachine \
            --title "Vivarium ${TAG}" \
            --generate-notes
